# ==============================================================================
# auto-detect-and-publish-gardenlinux.yml
#
# Automatically detects new SapMachine GA releases or new GardenLinux active
# minor versions, generates Dockerfiles on-the-fly, and builds + publishes
# multi-arch container images to ghcr.io/sap/sapmachine.
#
# Logic:
#   - New SapMachine version → build it against ALL known GardenLinux versions
#   - New GardenLinux version → build ALL known SapMachine versions against it
#   - Both new → full cross-product of all SM × all GL
#   - Neither new → skip entirely
#
# Schedule: Runs daily at 06:00 UTC. Can also be triggered manually.
# ==============================================================================
name: Auto-detect and publish SapMachine GardenLinux images

on:
  #schedule:
  #  - cron: '0 6 * * *'    # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write          # To commit updated known-versions file
  packages: write          # To push container images to GHCR

concurrency:
  group: "gardenlinux-auto-publish"
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Detect new versions and compute the build matrix
  # ============================================================================
  detect:
    name: Detect new SapMachine / GardenLinux versions
    runs-on: ubuntu-24.04
    outputs:
      has_new_versions: ${{ steps.detect.outputs.has_new_versions }}
      build_matrix:     ${{ steps.detect.outputs.build_matrix }}
      new_sm_versions:  ${{ steps.detect.outputs.new_sm_versions }}
      new_gl_versions:  ${{ steps.detect.outputs.new_gl_versions }}
      all_sm_versions:  ${{ steps.detect.outputs.all_sm_versions }}
      all_gl_versions:  ${{ steps.detect.outputs.all_gl_versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Run version detection
        id: detect
        run: |
          chmod +x .github/scripts/detect-new-versions.sh
          .github/scripts/detect-new-versions.sh

      - name: Summary
        run: |
          echo "### Version Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Has new versions:** ${{ steps.detect.outputs.has_new_versions }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New SapMachine versions:** ${{ steps.detect.outputs.new_sm_versions }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New GardenLinux versions:** ${{ steps.detect.outputs.new_gl_versions }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build matrix size:** $(echo '${{ steps.detect.outputs.build_matrix }}' | jq 'length')" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Job 2: Build and publish container images (matrix strategy)
  # ============================================================================
  build-and-publish:
    name: "Build SM ${{ matrix.combo.sm_major }} (${{ matrix.combo.sm_version }}) on GL ${{ matrix.combo.gl_major }} (${{ matrix.combo.gl_version }})"
    needs: detect
    if: needs.detect.outputs.has_new_versions == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        combo: ${{ fromJson(needs.detect.outputs.build_matrix) }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install qemu dependency for multi-arch build
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Generate Dockerfiles
        run: |
          chmod +x .github/scripts/generate-dockerfile.sh
          SM_MAJOR="${{ matrix.combo.sm_major }}"
          SM_VERSION="${{ matrix.combo.sm_version }}"
          GL_MAJOR="${{ matrix.combo.gl_major }}"
          GL_VERSION="${{ matrix.combo.gl_version }}"

          for flavour in jdk jdk-headless jre jre-headless; do
            .github/scripts/generate-dockerfile.sh \
              "${SM_MAJOR}" "${SM_VERSION}" "${GL_VERSION}" "${flavour}" \
              "build/${SM_MAJOR}/gardenlinux/${GL_MAJOR}/${flavour}"
          done

      - name: Login to GHCR
        run: |
          podman login -u token -p ${{ github.token }} ghcr.io

      - name: Build and push multi-arch images
        run: |
          SM_FLAVOURS=(jdk jdk-headless jre jre-headless)
          SM_REGISTRY="ghcr.io/sap/sapmachine"
          SM_MAJOR="${{ matrix.combo.sm_major }}"
          SM_VERSION="${{ matrix.combo.sm_version }}"
          GL_MAJOR="${{ matrix.combo.gl_major }}"
          GL_VERSION="${{ matrix.combo.gl_version }}"

          if [[ "${GL_MAJOR}" == "1877" ]]; then
            exit 0
          fi

          for sm_flvr in "${SM_FLAVOURS[@]}"; do
            build_dir="build/${SM_MAJOR}/gardenlinux/${GL_MAJOR}/${sm_flvr}"
            local_manifest="localhost/sapmachine-${SM_MAJOR}-${sm_flvr}-gl-${GL_MAJOR}"

            TAGS=(
              "${SM_MAJOR}-${sm_flvr}-gl"
              "${SM_VERSION}-${sm_flvr}-gl"
              "${SM_MAJOR}-${sm_flvr}-gl-${GL_MAJOR}"
              "${SM_MAJOR}-${sm_flvr}-gl-${GL_VERSION}"
              "${SM_VERSION}-${sm_flvr}-gl-${GL_MAJOR}"
              "${SM_VERSION}-${sm_flvr}-gl-${GL_VERSION}"
            )

            echo "::group::Building ${sm_flvr} (SM ${SM_MAJOR} / GL ${GL_MAJOR})"
            cd "${build_dir}"

            podman manifest create "${local_manifest}"
            podman build --platform linux/amd64,linux/arm64 --manifest "${local_manifest}" .

            for tag in "${TAGS[@]}"; do
              #podman manifest push "${local_manifest}" "${SM_REGISTRY}:${tag}"
              echo "✅ Pushed ${SM_REGISTRY}:${tag}"
            done

            echo "::endgroup::"
            cd "${GITHUB_WORKSPACE}"
          done

      - name: Summary
        run: |
          SM_MAJOR="${{ matrix.combo.sm_major }}"
          SM_VERSION="${{ matrix.combo.sm_version }}"
          GL_MAJOR="${{ matrix.combo.gl_major }}"
          GL_VERSION="${{ matrix.combo.gl_version }}"
          echo "### Published Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Base: ghcr.io/gardenlinux/gardenlinux:${GL_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for flvr in jdk jdk-headless jre jre-headless; do
            echo "- \`ghcr.io/sap/sapmachine:${SM_MAJOR}-${flvr}-gl\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/sap/sapmachine:${SM_VERSION}-${flvr}-gl\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/sap/sapmachine:${SM_MAJOR}-${flvr}-gl-${GL_MAJOR}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/sap/sapmachine:${SM_MAJOR}-${flvr}-gl-${GL_VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/sap/sapmachine:${SM_VERSION}-${flvr}-gl-${GL_MAJOR}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`ghcr.io/sap/sapmachine:${SM_VERSION}-${flvr}-gl-${GL_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          done

  # ============================================================================
  # Job 3: Commit the updated known-versions file back to the repo
  # ============================================================================
  update-known-versions:
    name: Update known versions file
    needs: [detect, build-and-publish]
    if: needs.detect.outputs.has_new_versions == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Override versions.json with current source data
        env:
          ALL_SM: ${{ needs.detect.outputs.all_sm_versions }}
          ALL_GL: ${{ needs.detect.outputs.all_gl_versions }}
        run: |
          # Build a completely fresh versions.json from current source data.
          # This drops any SM or GL versions that are no longer active.
          jq -n \
            --argjson sm "${ALL_SM}" \
            --argjson gl "${ALL_GL}" \
            '{ sapmachine: $sm, gardenlinux: $gl }' \
            > .github/known-versions/versions.json
          echo "Overwritten versions.json with current source data:"
          cat .github/known-versions/versions.json

      - name: Commit and push updated versions
        run: |
          git config --local user.email "sapmachine@sap.com"
          git config --local user.name "SapMachine Github Actions Bot"
          git add .github/known-versions/versions.json
          git diff --cached --quiet || git commit -m "Update known SapMachine/GardenLinux versions"
          git push

  # ============================================================================
  # Job 4: Notify on failure – send email if any of the 3 jobs failed
  # ============================================================================
  notify-on-failure:
    name: Notify on failure
    needs: [detect, build-and-publish, update-known-versions]
    if: >-
      always() &&
      (needs.detect.result == 'failure'
       || needs.build-and-publish.result == 'failure'
       || needs.update-known-versions.result == 'failure')
    runs-on: ubuntu-24.04
    steps:
      - name: Collect failure details
        id: failure-info
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MSG="The following jobs failed in workflow run ${RUN_URL} :"
          MSG="${MSG}\n"

          if [[ "${{ needs.detect.result }}" == "failure" ]]; then
            MSG="${MSG}\n  - detect (version detection)"
          fi
          if [[ "${{ needs.build-and-publish.result }}" == "failure" ]]; then
            MSG="${MSG}\n  - build-and-publish (image build / push)"
          fi
          if [[ "${{ needs.update-known-versions.result }}" == "failure" ]]; then
            MSG="${MSG}\n  - update-known-versions (git commit / push)"
          fi

          MSG="${MSG}\n\nPlease check the workflow run for details:\n${RUN_URL}"

          # Store for next step (escape newlines for GITHUB_OUTPUT)
          echo "run_url=${RUN_URL}" >> "${GITHUB_OUTPUT}"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "message<<${EOF}" >> "${GITHUB_OUTPUT}"
          echo -e "${MSG}" >> "${GITHUB_OUTPUT}"
          echo "${EOF}" >> "${GITHUB_OUTPUT}"

      - name: Send failure notification email
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ GardenLinux image pipeline failed – ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL_RECIPIENTS }}
          from: "GitHub Actions <${{ secrets.SMTP_FROM_ADDRESS }}>"
          body: ${{ steps.failure-info.outputs.message }}
