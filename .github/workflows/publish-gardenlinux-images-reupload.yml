          old_tag=21-jre-gl-1877
          new_tag=21-jre
          podman tag ${SM_REGISTRY}:$old_tag ${SM_REGISTRY}:$new_tag
          podman push ${SM_REGISTRY}:$new_tag

      - name: Pull and Republish SapMachine images for 21-jre-headless-gl-1877
        run: |
          SM_REGISTRY="ghcr.io/sap/sapmachine"
          old_tag=21-jre-headless-gl-1877
          new_tag=21-jre-headless
          podman tag ${SM_REGISTRY}:$old_tag ${SM_REGISTRY}:$new_tag
          podman push ${SM_REGISTRY}:$new_tag

      - name: Pull and Republish SapMachine images for 25-jdk-gl-1877
